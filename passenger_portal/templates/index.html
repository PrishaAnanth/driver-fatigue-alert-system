<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driver Live Status</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #f0f0f0; }
        h1 { color: #333; }
        .status-box { 
            font-size: 2em; 
            padding: 20px; 
            border-radius: 10px; 
            display: inline-block; 
            min-width: 250px; 
            transition: background 0.3s, color 0.3s;
        }
        .Alert { background-color: #4caf50; color: white; }
        .Drowsy { background-color: #f44336; color: white; }
        .Yawning { background-color: #ff9800; color: white; }
        .Unknown { background-color: #9e9e9e; color: white; }
        #timestamp { margin-top: 10px; font-size: 1em; color: #555; }
        #enableAudioOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            z-index: 9999;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🚗 Driver Live Status</h1>
    <div id="status" class="status-box Unknown">Loading...</div>
    <p id="timestamp"></p>

    <!-- Audio element for sleepy beep -->
    <audio id="beepAudio" src="/static/beep.mp3" preload="auto"></audio>

    <!-- Overlay to enable audio on first click -->
    <div id="enableAudioOverlay">🔊 Click anywhere to enable alerts & sound</div>

    <script>
        const socket = io();
        const beepAudio = document.getElementById("beepAudio");
        const overlay = document.getElementById("enableAudioOverlay");
        let audioEnabled = false;

        // Enable audio on first click
        overlay.addEventListener("click", () => {
            beepAudio.play().then(() => {
                beepAudio.pause();
                beepAudio.currentTime = 0;
                audioEnabled = true;
                overlay.style.display = "none";
            }).catch(() => {
                console.warn("User gesture required to enable audio.");
            });
        });

        function updateStatus(data) {
            const statusDiv = document.getElementById("status");
            const status = data.status || "Unknown";

            let statusClass = "Unknown";
            if (status === "Drowsy - Eyes Closed") statusClass = "Drowsy";
            else if (status === "Drowsy - Yawning") statusClass = "Yawning";
            else if (status.toLowerCase() === "alert" || status.toLowerCase() === "normal") statusClass = "Alert";

            statusDiv.textContent = status;
            statusDiv.className = "status-box " + statusClass;
            document.getElementById("timestamp").textContent = data.timestamp ? "Last update: " + data.timestamp : "";

            // Play beep only if audio enabled by user
            if (audioEnabled) {
                if (status === "Drowsy - Eyes Closed") {
                    if (beepAudio.paused) {
                        beepAudio.loop = true;
                        beepAudio.play().catch(err => console.warn("Beep playback failed:", err));
                    }
                } else {
                    if (!beepAudio.paused) {
                        beepAudio.pause();
                        beepAudio.currentTime = 0;
                    }
                }
            }
        }

        // --- Socket.IO real-time updates ---
        socket.on("driver_update", (data) => updateStatus(data));

        // --- Fallback polling every 3 seconds ---
        async function fallbackFetch() {
            try {
                const res = await fetch("/status");
                const data = await res.json();
                updateStatus(data);
            } catch (err) {
                console.warn("Fallback fetch failed:", err);
            }
            setTimeout(fallbackFetch, 3000);
        }
        fallbackFetch();
    </script>
</body>
</html>
